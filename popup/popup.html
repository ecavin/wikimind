<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>WikiMind</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="aurora" aria-hidden="true"></div>

  <header class="hdr">
    <div class="logo">
      <svg viewBox="0 0 32 32" width="26" height="26" aria-hidden="true">
        <defs>
          <linearGradient id="logo-grad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#a78bfa"/>
            <stop offset="100%" stop-color="#f472b6"/>
          </linearGradient>
        </defs>
        <circle cx="16" cy="16" r="14" fill="none" stroke="url(#logo-grad)" stroke-width="1.5" opacity="0.35"/>
        <circle cx="8" cy="12" r="2.4" fill="url(#logo-grad)"/>
        <circle cx="22" cy="9" r="2" fill="url(#logo-grad)" opacity="0.75"/>
        <circle cx="24" cy="22" r="2.8" fill="url(#logo-grad)"/>
        <circle cx="11" cy="23" r="1.8" fill="url(#logo-grad)" opacity="0.7"/>
        <circle cx="16" cy="16" r="2" fill="#fff"/>
        <path d="M8 12 L16 16 L22 9 M16 16 L24 22 M16 16 L11 23" stroke="url(#logo-grad)" stroke-width="1.2" fill="none" opacity="0.7"/>
      </svg>
      <div class="wordmark">
        <span class="brand">WikiMind</span>
        <span class="tag">your reading, mapped</span>
      </div>
    </div>
    <button id="open-settings" class="icon-btn" title="Settings" aria-label="Settings">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/>
      </svg>
    </button>
  </header>

  <section class="stats">
    <div class="stat">
      <div class="stat-val" id="stat-articles">–</div>
      <div class="stat-lbl">articles</div>
    </div>
    <div class="stat-divider" aria-hidden="true"></div>
    <div class="stat">
      <div class="stat-val" id="stat-connections">–</div>
      <div class="stat-lbl">connections</div>
    </div>
    <div class="stat-divider" aria-hidden="true"></div>
    <div class="stat">
      <div class="stat-val" id="stat-streak">–</div>
      <div class="stat-lbl">day streak</div>
    </div>
  </section>

  <section class="recent">
    <div class="section-head">
      <h2>Recent reading</h2>
      <span id="recent-count" class="count"></span>
    </div>
    <ul id="recent-list">
      <li class="empty">
        <div class="empty-glyph">📖</div>
        <div class="empty-text">
          <strong>Nothing tracked yet.</strong>
          <span>Visit a Wikipedia article to get started.</span>
        </div>
      </li>
    </ul>
  </section>

  <button id="open-dashboard" class="primary-btn">
    <span>Open Dashboard</span>
    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
  </button>

  <script src="../lib/storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
