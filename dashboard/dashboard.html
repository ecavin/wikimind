<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>WikiMind — Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <header id="topbar">
    <div class="brand">WikiMind</div>
    <input id="search" type="search" placeholder="Search articles…" autocomplete="off">
    <div class="filters">
      <label>From <input id="date-from" type="date"></label>
      <label>To <input id="date-to" type="date"></label>
    </div>
    <div class="controls">
      <button id="btn-fetch-links" title="Re-fetch links for all articles">Fetch Links</button>
      <button id="btn-toggle-view">List View</button>
      <button id="btn-cluster">Cluster</button>
      <button id="btn-recommend" class="primary">Recommend</button>
    </div>
  </header>

  <main id="stage">
    <div id="graph-container">
      <svg id="graph"></svg>
      <div id="empty-state" class="empty-state hidden">
        <h2>Nothing to show yet</h2>
        <p>Visit some Wikipedia articles and they'll appear here as a graph.</p>
      </div>
      <div id="large-warning" class="toast hidden">
        <span>You have <b id="large-count">0</b> articles — graph may be slow.</span>
        <button id="btn-filter-30">Filter to last 30 days</button>
        <button id="btn-dismiss-warning" class="subtle">Dismiss</button>
      </div>
      <div id="cluster-legend" class="legend hidden"></div>
    </div>

    <div id="list-view" class="hidden">
      <table>
        <thead>
          <tr><th>Title</th><th>Visits</th><th>Last Visited</th><th>Categories</th></tr>
        </thead>
        <tbody id="list-body"></tbody>
      </table>
    </div>

    <aside id="info-panel" class="hidden">
      <button id="info-close" class="icon-btn" aria-label="Close">×</button>
      <h2 id="info-title"></h2>
      <p id="info-summary"></p>
      <dl>
        <dt>Visits</dt><dd id="info-visits"></dd>
        <dt>First</dt><dd id="info-first"></dd>
        <dt>Last</dt><dd id="info-last"></dd>
      </dl>
      <h3>Linked articles</h3>
      <div id="info-links" class="chips"></div>
      <a id="info-open" href="#" target="_blank" rel="noopener">Open on Wikipedia →</a>
    </aside>
  </main>

  <div id="recommend-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-panel">
      <header>
        <h2>Recommendations</h2>
        <button id="modal-close" class="icon-btn" aria-label="Close">×</button>
      </header>
      <div id="modal-body">
        <div id="modal-loading" class="loading hidden">
          <div class="spinner"></div>
          <span>Asking Gemini…</span>
        </div>
        <section id="rec-section">
          <h3>Suggested reading</h3>
          <div id="rec-list"></div>
        </section>
        <section id="gap-section">
          <h3>Gap Analysis</h3>
          <div id="gap-list"></div>
        </section>
      </div>
    </div>
  </div>

  <script src="vendor/d3.min.js"></script>
  <script src="../lib/storage.js"></script>
  <script src="../lib/wikipedia.js"></script>
  <script src="../lib/llm.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
